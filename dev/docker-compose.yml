# ============================================================================
# LOCAL development overrides for the self-contained bundle. The production
# docker-compose.yml ALREADY defines db + redis + minio + gotrue + auth-proxy +
# init + app; this file only adjusts them for a no-Traefik, no-TLS, localhost box:
#   • build the app/init images locally instead of pulling from GHCR
#   • publish ports (app 3000, minio 9000/9001, gotrue-proxy 8000, db 5432)
#   • point browser-facing URLs at localhost and turn email auto-confirm ON
#   • make `proxy` a local bridge (no external Traefik network needed)
#
# It lives in dev/ (NOT named docker-compose.override.yml) so a bare `docker compose
# up` and stack managers (dockhand) use ONLY the production file. Run it explicitly:
#
#   docker compose --env-file dev/dev.env -f docker-compose.yml -f dev/docker-compose.yml up -d --build
#
# Generate a migration in node22 (host Node 26 breaks migrate:create):
#   docker compose --env-file dev/dev.env -f docker-compose.yml -f dev/docker-compose.yml \
#     --profile tools run --rm migrator npm run migrate:create -- <name>
# ============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: csa-website:latest
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Browser reaches GoTrue via the published auth-proxy and MinIO directly.
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      SUPABASE_S3_PUBLIC_ENDPOINT: http://localhost:9000
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      DATABASE_SSL: "false"

  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: csa-website-init:latest
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      SUPABASE_S3_PUBLIC_ENDPOINT: http://localhost:9000
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      DATABASE_SSL: "false"

  # db: the base already binds 127.0.0.1:5432 (loopback) — reachable on the host for a
  # local GUI without an override here.

  minio:
    ports:
      - "9000:9000" # S3 API (browser reaches presigned URLs at localhost:9000)
      - "9001:9001" # web console (dev-only)

  auth-proxy:
    ports:
      - "8000:8000" # browser reaches Supabase Auth at localhost:8000

  gotrue:
    environment:
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "http://localhost:3000,http://localhost:3000/**"
      GOTRUE_MAILER_AUTOCONFIRM: "true" # dev: skip email confirmation (prod sets false + SMTP)

  # Profile-gated migration generator — Payload introspects the schema diff in node22
  # (the host's Node 26 breaks migrate:create). Writes the SQL back to ./src/migrations.
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: csa-website-init:latest
    environment:
      DATABASE_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      DATABASE_SSL: "false"
    command: ["npm", "run", "migrate"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - ./src/migrations:/app/src/migrations
      - ./src/scripts:/app/src/scripts
    profiles: ["tools"]

# No external Traefik locally — make `proxy` a plain local bridge so the app/minio/
# auth-proxy services (which join it in the base) resolve without an external network.
networks:
  proxy:
    external: false
