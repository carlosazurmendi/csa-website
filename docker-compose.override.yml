# ============================================================================
# LOCAL development / Milestone-1 gate verification overrides.
# Auto-merged by `docker compose up`. Do NOT use in production.
#
# - Adds a throwaway Postgres (prod uses the EXTERNAL self-hosted Supabase; never bundled).
# - Publishes the app port so the stack is reachable without Traefik.
# - Redefines `web` as a local bridge so no external Traefik network is required.
# - Provides a one-off `migrator` (builder stage = full deps) to generate/apply migrations.
#
# Gate flow:
#   docker compose build
#   docker compose run --rm migrator npm run migrate:create -- initial   # writes src/migrations
#   docker compose run --rm migrator                                     # applies migrations
#   docker compose up -d                                                 # app + redis + postgres
# ============================================================================
services:
  app:
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    networks:
      - internal
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file: .env
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    volumes:
      # Persist generated migration SQL back to the host (plain text — no native binaries).
      - ./src/migrations:/app/src/migrations
      # Live-mount seed/maintenance scripts so they can be iterated without an image rebuild.
      - ./src/scripts:/app/src/scripts
    profiles: ["tools"]

volumes:
  pg-data:

networks:
  web:
    external: false
