# ============================================================================
# LOCAL development / Milestone-1 gate verification overrides.
# Auto-merged by `docker compose up`. Do NOT use in production.
#
# - Adds a throwaway Postgres (prod uses the EXTERNAL self-hosted Supabase; never bundled).
# - Publishes the app port so the stack is reachable without Traefik.
# - Redefines `web` as a local bridge so no external Traefik network is required.
# - Provides a one-off `migrator` (builder stage = full deps) to generate/apply migrations.
#
# Gate flow:
#   docker compose build
#   docker compose run --rm migrator npm run migrate:create -- initial   # writes src/migrations
#   docker compose run --rm migrator                                     # applies migrations
#   docker compose up -d                                                 # app + redis + postgres
# ============================================================================
services:
  app:
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    networks:
      - internal
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local S3-compatible media store (stands in for Supabase Storage in dev).
  # Same Payload s3Storage code path; prod swaps the env to real Supabase.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin12345}
    ports:
      - "9000:9000" # S3 API (host-run seed reaches it at localhost:9000)
      - "9001:9001" # web console
    networks:
      - internal
    volumes:
      - minio-data:/data

  # One-off: create the public marketing bucket once MinIO is up, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin12345}
      S3_PUBLIC_BUCKET: ${S3_PUBLIC_BUCKET:-marketing}
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo 'waiting for minio...'; sleep 2;
        done;
        mc mb -p "local/$$S3_PUBLIC_BUCKET" || true;
        mc anonymous set download "local/$$S3_PUBLIC_BUCKET" || true;
        echo "minio bucket $$S3_PUBLIC_BUCKET ready";
    networks:
      - internal

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file: .env
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    volumes:
      # Persist generated migration SQL back to the host (plain text — no native binaries).
      - ./src/migrations:/app/src/migrations
      # Live-mount seed/maintenance scripts so they can be iterated without an image rebuild.
      - ./src/scripts:/app/src/scripts
    profiles: ["tools"]

volumes:
  pg-data:
  minio-data:

networks:
  web:
    external: false
