# ============================================================================
# CSA — production stack (Traefik ingress + Redis). Postgres is EXTERNAL:
# the app connects to the existing self-hosted Supabase via DATABASE_URI.
# Postgres is therefore deliberately NOT a service here.
#
#   prod:  docker compose -f docker-compose.yml up -d   (requires external `web` network)
#   local: docker compose up -d                         (docker-compose.override.yml merges)
# ============================================================================

# Full app/migrator container environment. Each value is resolved from ${...}, which
# Compose fills from EITHER the stack manager's env vars (dockhand, Portainer, …) OR a
# .env file in the project dir (manual deploys / scripts/deploy.sh — Compose auto-loads
# it). There is deliberately NO `env_file:` directive, so a missing .env never blocks a
# stack-manager deploy. Optional values default to empty / a sane default.
x-csa-env: &csa-env
  NODE_ENV: ${NODE_ENV:-production}
  PAYLOAD_SECRET: ${PAYLOAD_SECRET:-}
  DATABASE_URI: ${DATABASE_URI:-}
  DATABASE_SSL: ${DATABASE_SSL:-true}
  DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-false}
  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-}
  NEXT_PUBLIC_AUTH_GOOGLE: ${NEXT_PUBLIC_AUTH_GOOGLE:-}
  SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:-}
  SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-us-east-1}
  SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:-}
  SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:-}
  S3_PUBLIC_BUCKET: ${S3_PUBLIC_BUCKET:-marketing}
  S3_PROTECTED_BUCKET: ${S3_PROTECTED_BUCKET:-course-assets}
  REDIS_URL: ${REDIS_URL:-}
  NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-}
  CHECKOUT_ALLOWED_ORIGINS: ${CHECKOUT_ALLOWED_ORIGINS:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
  STRIPE_AUTOMATIC_TAX: ${STRIPE_AUTOMATIC_TAX:-false}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  SAFETY_CHAT_MODEL: ${SAFETY_CHAT_MODEL:-claude-sonnet-4-6}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: csa-website:latest
    restart: unless-stopped
    environment: *csa-env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web
      - internal
      - supabase # reach the self-hosted Supabase Postgres + Auth on its own network
    labels:
      # Traefik coupling is parameterised so it can match an existing Traefik
      # install — set TRAEFIK_NETWORK / TRAEFIK_ENTRYPOINT_HTTP(S) / TRAEFIK_CERTRESOLVER
      # in .env (defaults: web / web / websecure / letsencrypt). scripts/deploy.sh prompts for these.
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.csa.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.csa.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.csa.tls=true"
      - "traefik.http.routers.csa.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.csa.loadbalancer.server.port=3000"
      - "traefik.http.routers.csa.middlewares=csa-compress@docker"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.csa-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.csa-http.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}"
      - "traefik.http.routers.csa-http.middlewares=csa-https-redirect@docker"
      - "traefik.http.middlewares.csa-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.csa-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.middlewares.csa-compress.compress=true"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - internal # internal-only: no published ports
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # One-off MIGRATION runner (production). NOT a long-running service — it is gated
  # behind the `tools` profile so a normal `up` never starts it. Run it explicitly
  # BEFORE bringing the app up, and again after any deploy that adds migrations:
  #
  #   docker compose -f docker-compose.yml --profile tools run --rm migrator
  #
  # Built from the `builder` stage (full deps + Payload CLI + src — the slim runner
  # image has none of these), so it shares the app's build cache. It connects to the
  # SAME external Supabase DATABASE_URI as the app (via .env) and applies the
  # committed, additive migrations only — it never runs `push`. First deploy only:
  # follow with `... run --rm migrator npm run seed:admin` to create the first admin.
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: csa-website-migrator:latest
    environment: *csa-env
    command: ["npm", "run", "migrate"]
    networks:
      - internal
      - supabase # must reach the self-hosted Supabase Postgres (DATABASE_URI host = db)
    profiles: ["tools"]

volumes:
  redis-data:

networks:
  web:
    external: true # shared with Traefik (the real network name = ${TRAEFIK_NETWORK})
    name: ${TRAEFIK_NETWORK:-proxy}
  supabase:
    external: true # the self-hosted Supabase stack's network (must already exist)
    name: ${SUPABASE_NETWORK:-supabase_default}
  internal:
    driver: bridge
