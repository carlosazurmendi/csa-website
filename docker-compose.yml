# ============================================================================
# CSA — production stack (Traefik ingress + Redis). Postgres is EXTERNAL:
# the app connects to the existing self-hosted Supabase via DATABASE_URI.
# Postgres is therefore deliberately NOT a service here.
#
#   prod:  docker compose -f docker-compose.yml up -d   (needs external `proxy` + `supabase_default` nets)
#   local: docker compose -f docker-compose.yml -f dev/docker-compose.yml up -d
# ============================================================================

# Full app/migrator container environment. Each value is resolved from ${...}, which
# Compose fills from EITHER the stack manager's env vars (dockhand, Portainer, …) OR a
# .env file in the project dir (manual deploys / scripts/deploy.sh — Compose auto-loads
# it). There is deliberately NO `env_file:` directive, so a missing .env never blocks a
# stack-manager deploy. Optional values default to empty / a sane default.
x-csa-env: &csa-env
  NODE_ENV: ${NODE_ENV:-production}
  PAYLOAD_SECRET: ${PAYLOAD_SECRET:-}
  DATABASE_URI: ${DATABASE_URI:-}
  DATABASE_SSL: ${DATABASE_SSL:-true}
  DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-false}
  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-}
  NEXT_PUBLIC_AUTH_GOOGLE: ${NEXT_PUBLIC_AUTH_GOOGLE:-}
  SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:-}
  SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-us-east-1}
  SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:-}
  SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:-}
  S3_PUBLIC_BUCKET: ${S3_PUBLIC_BUCKET:-marketing}
  S3_PROTECTED_BUCKET: ${S3_PROTECTED_BUCKET:-course-assets}
  REDIS_URL: ${REDIS_URL:-}
  NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-}
  CHECKOUT_ALLOWED_ORIGINS: ${CHECKOUT_ALLOWED_ORIGINS:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
  STRIPE_AUTOMATIC_TAX: ${STRIPE_AUTOMATIC_TAX:-false}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  SAFETY_CHAT_MODEL: ${SAFETY_CHAT_MODEL:-claude-sonnet-4-6}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: csa-website:latest
    restart: unless-stopped
    environment: *csa-env
    depends_on:
      init:
        condition: service_completed_successfully # migrate + seed must finish first
      redis:
        condition: service_healthy
    networks:
      - proxy
      - internal
      - supabase_default # reach the self-hosted Supabase Postgres + Auth on its own network
    labels:
      # Traefik entrypoints + cert resolver are parameterised (set TRAEFIK_ENTRYPOINT_HTTP(S)
      # / TRAEFIK_CERTRESOLVER in .env; defaults web / websecure / letsencrypt). The shared
      # network name is the `proxy:` external network (below) + this docker.network label.
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.csa.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.csa.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.csa.tls=true"
      - "traefik.http.routers.csa.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.csa.loadbalancer.server.port=3000"
      - "traefik.http.routers.csa.middlewares=csa-compress@docker"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.csa-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.csa-http.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}"
      - "traefik.http.routers.csa-http.middlewares=csa-https-redirect@docker"
      - "traefik.http.middlewares.csa-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.csa-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.middlewares.csa-compress.compress=true"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - internal # internal-only: no published ports
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Auto-init job — runs to completion BEFORE the app every deploy (the app's
  # depends_on gates on it). On a fresh database it brings Supabase up to the built
  # state: wait-for-db → migrate → create buckets → seed admin + content + media +
  # course (see scripts/bootstrap.sh). Idempotent + first-run-guarded, so a redeploy
  # only re-migrates and never re-seeds over CMS edits. Built from the `builder` stage
  # (Payload CLI + src + pg — the slim runner image has none of these), sharing the
  # app's build cache. It never runs `push`. Ad-hoc ops, e.g. force a content reseed:
  #   docker compose -f docker-compose.yml run --rm init npm run seed
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: csa-website-init:latest
    restart: "no" # one-shot job, not a long-running service
    environment: *csa-env
    command: ["bash", "scripts/bootstrap.sh"]
    networks:
      - internal
      - supabase_default # reach the self-hosted Supabase Postgres (DATABASE_URI host = supabase-db)

volumes:
  redis-data:

networks:
  # External networks are referenced by their REAL names as the keys (no key→name
  # remap). This is the most portable form and sidesteps the
  # "network … has incorrect label com.docker.compose.network" error you hit when a
  # service joins ANOTHER compose project's network (e.g. Supabase's `supabase_default`).
  # If your Traefik / Supabase networks are named differently, rename these keys AND the
  # matching service `networks:` entries (and the `traefik.docker.network` label).
  proxy:
    external: true # your existing Traefik network
  supabase_default:
    external: true # the self-hosted Supabase stack's network (must already exist)
  internal:
    driver: bridge
