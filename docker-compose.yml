# CSA website — production container, fronted by Traefik.
# Runtime config comes from .env (DATABASE_URI, PAYLOAD_SECRET,
# NEXT_PUBLIC_SERVER_URL, and the S3_* vars if using Supabase Storage).
# `.env` is host-side only — never baked into the image.
services:
  web:
    build: .
    image: csa-website
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      # Persists local-disk uploads across restarts. Unused once the S3_* env
      # vars are set (then media lives in Supabase Storage).
      - csa_media:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.handistack.rule=Host(`csa-website-staging.handistack.com`)"
      - "traefik.http.routers.handistack.entrypoints=websecure"
      - "traefik.http.routers.handistack.tls=true"
      - "traefik.http.routers.handistack.tls.certresolver=myresolver"
      - "traefik.docker.network=proxy"
      # App listens on 3000 (see Dockerfile PORT/HOSTNAME), so Traefik targets 3000.
      - "traefik.http.services.handistack.loadbalancer.server.port=3000"
      - "dev.quenary.handistack.protected=true"

networks:
  proxy:
    external: true

volumes:
  csa_media:
