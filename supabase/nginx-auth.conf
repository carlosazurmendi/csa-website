# Minimal local stand-in for the Supabase API gateway (Kong) — routes only the
# auth surface that supabase-js uses (`${SUPABASE_URL}/auth/v1/*`) to the GoTrue
# container, and adds the CORS headers a real Supabase deployment returns (the app
# origin is cross-origin to the auth origin in dev). The app never uses Supabase
# REST/Storage via supabase-js (data is in Payload; media is the S3 plugin).
events {}
http {
  server {
    listen 8000;

    # supabase-js calls ${url}/auth/v1/<endpoint>; GoTrue serves at root, so the
    # trailing slash on proxy_pass strips the /auth/v1/ prefix.
    location /auth/v1/ {
      # Browser cross-origin (localhost:3000 → localhost:8000). Reflect the origin
      # and strip any upstream CORS header so it isn't duplicated.
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Credentials';

      if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version, Accept, Accept-Profile, Content-Profile, Prefer, X-Requested-With' always;
        add_header 'Access-Control-Max-Age' 86400 always;
        add_header 'Content-Length' 0;
        add_header 'Content-Type' 'text/plain' always;
        return 204;
      }

      add_header 'Access-Control-Allow-Origin' $http_origin always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version, Accept' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Range, X-Supabase-Api-Version' always;

      proxy_pass http://gotrue:9999/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
      proxy_pass http://gotrue:9999/health;
    }

    location / { return 404; }
  }
}
