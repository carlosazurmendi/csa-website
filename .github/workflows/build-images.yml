name: build-images

# Builds the app + init images OFF-box (GH runners have ~16 GB — no OOM) and pushes
# them to GHCR. dockhand only PULLS these; the production box never builds.
#
#   ghcr.io/<owner>/csa-website        (runner stage)  -> the app
#   ghcr.io/<owner>/csa-website-init   (builder stage) -> migrate + seed job
#
# Tags: `latest` on the default branch, `sha-<short>` always (pin IMAGE_TAG to a sha
# in dockhand for immutable deploys), and the tag name on a `v*` tag push.
# After this workflow goes green, redeploy in dockhand to pull the new images.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- app image (final `runner` stage) ----
      - name: Metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ---- init image (`builder` stage: Payload CLI + src + pg for migrate/seed) ----
      - name: Metadata (init)
        id: meta-init
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-init
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build & push init
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ${{ steps.meta-init.outputs.tags }}
          labels: ${{ steps.meta-init.outputs.labels }}
          cache-from: type=gha,scope=init
          cache-to: type=gha,mode=max,scope=init
